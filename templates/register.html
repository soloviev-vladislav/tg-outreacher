<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация через Telegram</title>
    <style>
        :root {
            --bg: #f3f5f8;
            --card: #ffffff;
            --text: #1a1f2b;
            --muted: #6c7484;
            --border: #d8deea;
            --danger: #c0392b;
            --ok: #1f8b4c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #f7f9fc 0%, #eef2f8 100%);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 470px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(28, 41, 71, 0.08);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }
        p {
            margin: 0 0 16px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.4;
        }
        .widget-wrap {
            display: flex;
            justify-content: center;
            min-height: 44px;
            margin-top: 6px;
        }
        .message {
            margin-top: 14px;
            font-size: 13px;
            min-height: 18px;
        }
        .err { color: var(--danger); }
        .ok { color: var(--ok); }
        .links {
            margin-top: 14px;
            font-size: 13px;
            color: var(--muted);
        }
        .links a {
            color: #2f6fed;
            text-decoration: none;
        }
        .payment-wrap {
            margin-top: 12px;
            display: none;
            text-align: center;
        }
        .pay-link {
            display: inline-block;
            background: #2f6fed;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Регистрация</h1>
        <p>Регистрация выполняется через Telegram Login Widget. После регистрации аккаунт ожидает активацию админом.</p>

        <div id="widgetWrap" class="widget-wrap"></div>
        <div id="message" class="message {% if auth_error %}err{% elif auth_message %}ok{% endif %}">
            {% if auth_error %}
                {{ auth_error }}
            {% elif auth_message %}
                {{ auth_message }}
            {% endif %}
        </div>
        <div id="paymentWrap" class="payment-wrap">
            <a id="payLink" class="pay-link" href="#" target="_blank" rel="noopener">Оплатить подписку</a>
        </div>

        <div class="links">
            Уже есть аккаунт: <a href="/login">войти через Telegram</a>
            <br>
            <a href="/oferta" target="_blank" rel="noopener" style="font-size:12px; color:#64748b;">Оферта</a>
        </div>
    </div>

    <script>
        const botUsername = {{ (telegram_bot_username or '')|tojson }};
        const messageEl = document.getElementById('message');
        const widgetWrap = document.getElementById('widgetWrap');
        const paymentWrap = document.getElementById('paymentWrap');
        const payLink = document.getElementById('payLink');

        function setMessage(text, isError) {
            messageEl.textContent = text || '';
            messageEl.classList.remove('err', 'ok');
            if (!text) return;
            messageEl.classList.add(isError ? 'err' : 'ok');
        }
        function setPaymentUrl(url) {
            const value = String(url || '').trim();
            if (!value) {
                paymentWrap.style.display = 'none';
                payLink.setAttribute('href', '#');
                return;
            }
            payLink.setAttribute('href', value);
            paymentWrap.style.display = 'block';
        }

        async function onTelegramAuth(user) {
            try {
                setMessage('Проверяем Telegram авторизацию...', false);
                setPaymentUrl('');
                const response = await fetch('/api/auth/telegram/widget', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: 'register', auth: user })
                });
                const payload = await response.json().catch(() => ({}));
                if (!response.ok && payload.status !== 'payment_required') {
                    setMessage(payload.error || 'Ошибка регистрации через Telegram', true);
                    return;
                }
                if (payload.status === 'ok') {
                    window.location.href = payload.next || '/';
                    return;
                }
                if (payload.status === 'pending') {
                    setMessage(payload.message || 'Заявка создана, ожидайте активацию', false);
                    return;
                }
                if (payload.status === 'payment_required') {
                    const stars = Number(payload.stars_price || 0);
                    const starsText = stars > 0 ? ` (${stars} Stars/мес)` : '';
                    setMessage((payload.message || 'Требуется оплата подписки') + starsText, true);
                    setPaymentUrl(payload.payment_url || '');
                    return;
                }
                setMessage(payload.error || payload.message || 'Ошибка регистрации через Telegram', true);
            } catch (err) {
                setMessage('Сервер недоступен', true);
            }
        }

        window.onTelegramAuth = onTelegramAuth;

        if (!botUsername) {
            setMessage('Telegram Login не настроен: не задан bot username', true);
        } else {
            const script = document.createElement('script');
            script.async = true;
            script.src = 'https://telegram.org/js/telegram-widget.js?23';
            script.setAttribute('data-telegram-login', botUsername);
            script.setAttribute('data-size', 'large');
            script.setAttribute('data-onauth', 'onTelegramAuth(user)');
            script.setAttribute('data-request-access', 'write');
            widgetWrap.appendChild(script);
        }
    </script>
</body>
</html>
